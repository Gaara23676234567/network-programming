spring.application.name=hotel-api

# H2 Database
spring.datasource.url=jdbc:h2:mem:hoteldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Изменил на update, чтобы таблицы не конфликтовали при перезапуске
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ГЛАВНАЯ СТРОКА: ждать создания таблиц перед запуском data.sql
spring.jpa.defer-datasource-initialization=true

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Настройка инициализации
spring.sql.init.mode=always

server.port=8080